experiment_name = "exp2_concat"

[paths]
data_root = "dataset/KOREATECH-CGH-512-3.6Mu"
weight_dir = "weight/v3"
result_dir = "results/exp2_concat"
log_dir    = "logs"

# Exp2: RGB + depth + cos + sin concatenated — physics channels mixed into main encoder, no cross-attention
[encoder]
res           = 512
pitch         = 3.6e-6
wavelength    = 638e-9
depth_range_m = 0.0203336
include_rgb       = true
include_depth     = true
include_freq_cos  = true
include_freq_sin  = true

[model]
name               = "simple_unet"
out_channels       = 2
base_channels      = 64
use_cross_attention = false

[train]
batch_size        = 4
learning_rate     = 1e-4
epochs            = 100
shuffle           = true
num_workers       = 0
checkpoint_every  = 10
resume_checkpoint = "weight/v3/exp2_concat_epoch_80.pth"

[inference]
checkpoint          = "weight/v3/exp2_concat_epoch_100.pth"
test_index          = "5799"
batch_output_subdir = "predictions"
prediction_prefix   = "pred_exp2"
